name: LogWebApp CI

on:
  push:
    paths:
      - "LogWebApp/**"
      - ".github/workflows/technology-logwebapp-ci.yml"
  pull_request:
    paths:
      - "LogWebApp/**"
      - ".github/workflows/technology-logwebapp-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: LogWebApp

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: LogWebApp/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -t . -v
