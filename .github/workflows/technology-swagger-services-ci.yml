name: Technology - SwaggerServices CI

env:
  JAVA_VERSION: "21"
  DISTRIBUTION: "temurin"

on:
  push:
    paths:
      - "swagger-services/**"
      - ".github/workflows/technology-swagger-services-ci.yml"
  pull_request:
    paths:
      - "swagger-services/**"
      - ".github/workflows/technology-swagger-services-ci.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - swagger-services/swagger-sample
          # - swagger-services/swagger-service
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          cache-dependency-path: ${{ matrix.module }}/pom.xml

      - name: Build and run unit tests
        working-directory: ${{ matrix.module }}
        run: mvn -B -ntp test
